name: Build Dr Stone OS ISO
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm archiso git grub syslinux mtools libisoburn dosfstools

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix line endings and BOM
        run: |
          sed -i '1s/^\xEF\xBB\xBF//' profiledef.sh
          sed -i 's/\r$//' profiledef.sh
          chmod +x profiledef.sh

      - name: Build ISO
        run: |
          mkdir -p grub syslinux out work
          mkarchiso -v -w work -o out .

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: drstone-os-iso
          path: out/*.iso
